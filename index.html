<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT MQTT Panel</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-microchip"></i> IoT MQTT Panel</h1>
                <div class="header-controls">
                    <button id="settingsBtn" class="btn btn-secondary">
                        <i class="fas fa-cog"></i> Settings
                    </button>
                    <button id="addPanelBtn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Panel
                    </button>
                    <div class="connection-status" id="connectionStatus">
                        <i class="fas fa-circle"></i>
                        <span>Disconnected</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="panels-grid" id="panelsGrid">
                <!-- Panels will be dynamically added here -->
            </div>
        </main>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-cog"></i> Settings</h2>
                    <button class="close-btn" id="closeSettings">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="settings-section">
                        <h3>MQTT Connection</h3>
                        <div class="form-group">
                            <label for="mqttHost">Host:</label>
                            <input type="text" id="mqttHost" placeholder="mqtt://localhost:1883" value="mqtt://localhost:1883">
                        </div>
                        <div class="form-group">
                            <label for="mqttUsername">Username:</label>
                            <input type="text" id="mqttUsername" placeholder="Username">
                        </div>
                        <div class="form-group">
                            <label for="mqttPassword">Password:</label>
                            <input type="password" id="mqttPassword" placeholder="Password">
                        </div>
                        <div class="form-group">
                            <label for="mqttClientId">Client ID:</label>
                            <input type="text" id="mqttClientId" placeholder="iot-panel-client" value="iot-panel-client">
                        </div>
                        <button id="connectBtn" class="btn btn-primary">Connect</button>
                        <button id="disconnectBtn" class="btn btn-danger">Disconnect</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Panel Modal -->
        <div id="addPanelModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-plus"></i> Add New Panel</h2>
                    <button class="close-btn" id="closeAddPanel">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="panelTitle">Panel Title:</label>
                        <input type="text" id="panelTitle" placeholder="Enter panel title">
                    </div>
                    <div class="form-group">
                        <label for="panelTopic">MQTT Topic:</label>
                        <input type="text" id="panelTopic" placeholder="sensor/temperature">
                    </div>
                    <div class="form-group">
                        <label for="panelType">Panel Type:</label>
                        <select id="panelType">
                            <option value="gauge">Gauge</option>
                            <option value="led">LED Indicator</option>
                            <option value="chart">Line Chart</option>
                            <option value="number">Number Display</option>
                            <option value="text">Text Display</option>
                            <option value="switch">Switch</option>
                            <option value="slider">Slider</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="panelIcon">Icon:</label>
                        <select id="panelIcon">
                            <option value="fas fa-thermometer-half">Temperature</option>
                            <option value="fas fa-tint">Humidity</option>
                            <option value="fas fa-lightbulb">Light</option>
                            <option value="fas fa-wifi">Signal</option>
                            <option value="fas fa-battery-half">Battery</option>
                            <option value="fas fa-cog">Settings</option>
                            <option value="fas fa-chart-line">Chart</option>
                            <option value="fas fa-power-off">Power</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="panelColor">Color Theme:</label>
                        <select id="panelColor">
                            <option value="blue">Blue</option>
                            <option value="green">Green</option>
                            <option value="red">Red</option>
                            <option value="orange">Orange</option>
                            <option value="purple">Purple</option>
                            <option value="teal">Teal</option>
                            <option value="pink">Pink</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="panelSize">Panel Size:</label>
                        <select id="panelSize">
                            <option value="small">Small (1x1)</option>
                            <option value="medium">Medium (2x1)</option>
                            <option value="large">Large (2x2)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="panelMin">Min Value:</label>
                        <input type="number" id="panelMin" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label for="panelMax">Max Value:</label>
                        <input type="number" id="panelMax" placeholder="100">
                    </div>
                    <div class="form-group">
                        <label for="panelUnit">Unit:</label>
                        <input type="text" id="panelUnit" placeholder="°C, %, V, etc.">
                    </div>
                    <button id="createPanelBtn" class="btn btn-primary">Create Panel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
